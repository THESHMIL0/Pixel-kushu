<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2D RPG Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  ❤️ HP: <span id="hp"></span>
  💰 Gold: <span id="gold"></span>
  ⭐ Level: <span id="level"></span>
</div>

<div id="shop">
  <h3>Shop (Press E to close)</h3>
  <button onclick="buySword()">Sword (+5 ATK) - 50 Gold</button>
  <button onclick="buyPotion()">Potion (+30 HP) - 20 Gold</button>
</div>

<script src="game.js"></script>
</body>
</html>
